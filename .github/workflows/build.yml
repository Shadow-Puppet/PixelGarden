name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed only for attaching APKs to tag releases
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # No wrapper binary is committed (keeps the repo clean for F-Droid
      # reproducibility review); provision Gradle directly instead.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Build release APK (unsigned)
        run: gradle assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pixelsprite-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: pixelsprite-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
